openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: Couple Budget Dashboard API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: partners
    description: Partner management
  - name: categories
    description: Budget categories
  - name: accounts
    description: Financial accounts
  - name: transactions
    description: Income and expense transactions
  - name: budgets
    description: Monthly category budgets
  - name: bills
    description: Recurring bills and subscriptions
  - name: savings
    description: Savings goals
  - name: dashboard
    description: Dashboard summaries and analytics

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  # ── Partners ──────────────────────────────────────────────────────────────
  /partners:
    get:
      operationId: getPartners
      tags: [partners]
      summary: List both partners
      responses:
        "200":
          description: List of partners
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Partner"

  /partners/{id}:
    patch:
      operationId: updatePartner
      tags: [partners]
      summary: Update a partner's name or avatar
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PartnerUpdate"
      responses:
        "200":
          description: Updated partner
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Partner"

  # ── Categories ────────────────────────────────────────────────────────────
  /categories:
    get:
      operationId: getCategories
      tags: [categories]
      summary: List all categories
      responses:
        "200":
          description: List of categories
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Category"
    post:
      operationId: createCategory
      tags: [categories]
      summary: Create a category
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CategoryInput"
      responses:
        "201":
          description: Created category
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Category"

  /categories/{id}:
    patch:
      operationId: updateCategory
      tags: [categories]
      summary: Update a category
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CategoryUpdate"
      responses:
        "200":
          description: Updated category
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Category"
    delete:
      operationId: deleteCategory
      tags: [categories]
      summary: Delete a category
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        "204":
          description: Deleted

  # ── Accounts ──────────────────────────────────────────────────────────────
  /accounts:
    get:
      operationId: getAccounts
      tags: [accounts]
      summary: List all accounts
      responses:
        "200":
          description: List of accounts
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Account"
    post:
      operationId: createAccount
      tags: [accounts]
      summary: Create an account
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AccountInput"
      responses:
        "201":
          description: Created account
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Account"

  /accounts/{id}:
    patch:
      operationId: updateAccount
      tags: [accounts]
      summary: Update an account
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AccountUpdate"
      responses:
        "200":
          description: Updated account
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Account"
    delete:
      operationId: deleteAccount
      tags: [accounts]
      summary: Delete an account
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        "204":
          description: Deleted

  # ── Transactions ──────────────────────────────────────────────────────────
  /transactions:
    get:
      operationId: getTransactions
      tags: [transactions]
      summary: List transactions with optional filters
      parameters:
        - name: month
          in: query
          schema: { type: ["string", "null"] }
          description: "Month filter in YYYY-MM format"
        - name: startDate
          in: query
          schema: { type: ["string", "null"] }
        - name: endDate
          in: query
          schema: { type: ["string", "null"] }
        - name: partnerId
          in: query
          schema: { type: ["integer", "null"] }
        - name: categoryId
          in: query
          schema: { type: ["integer", "null"] }
        - name: accountId
          in: query
          schema: { type: ["integer", "null"] }
        - name: type
          in: query
          schema:
            type: ["string", "null"]
            enum: [income, expense, null]
        - name: ownership
          in: query
          schema:
            type: ["string", "null"]
            enum: [shared, personal, null]
        - name: isRecurring
          in: query
          schema: { type: ["boolean", "null"] }
        - name: search
          in: query
          schema: { type: ["string", "null"] }
        - name: sortBy
          in: query
          description: >
            Comma-separated ordered list of sort fields.
            Each field must be one of: date, amount, merchant, category.
            Example: "date,amount" sorts by date first, then amount.
          schema:
            type: ["string", "null"]
        - name: sortDir
          in: query
          description: >
            Comma-separated ordered list of sort directions, aligned positionally with sortBy.
            Each value must be one of: asc, desc.
            Example: "desc,asc" — first field descending, second ascending.
          schema:
            type: ["string", "null"]
        - name: limit
          in: query
          schema: { type: ["integer", "null"] }
        - name: offset
          in: query
          schema: { type: ["integer", "null"] }
      responses:
        "200":
          description: Paginated list of transactions
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TransactionList"
    post:
      operationId: createTransaction
      tags: [transactions]
      summary: Create a transaction
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TransactionInput"
      responses:
        "201":
          description: Created transaction
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Transaction"

  /transactions/{id}:
    get:
      operationId: getTransaction
      tags: [transactions]
      summary: Get a single transaction
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Transaction
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Transaction"
    patch:
      operationId: updateTransaction
      tags: [transactions]
      summary: Update a transaction
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TransactionUpdate"
      responses:
        "200":
          description: Updated transaction
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Transaction"
    delete:
      operationId: deleteTransaction
      tags: [transactions]
      summary: Delete a transaction
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        "204":
          description: Deleted

  # ── Budgets ───────────────────────────────────────────────────────────────
  /budgets:
    get:
      operationId: getBudgets
      tags: [budgets]
      summary: List budgets, optionally filtered by month
      parameters:
        - name: month
          in: query
          schema: { type: ["string", "null"] }
          description: "YYYY-MM format"
      responses:
        "200":
          description: List of budgets
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Budget"
    post:
      operationId: createBudget
      tags: [budgets]
      summary: Create or upsert a budget entry
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BudgetInput"
      responses:
        "201":
          description: Created budget
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Budget"

  /budgets/{id}:
    patch:
      operationId: updateBudget
      tags: [budgets]
      summary: Update a budget entry
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BudgetUpdate"
      responses:
        "200":
          description: Updated budget
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Budget"
    delete:
      operationId: deleteBudget
      tags: [budgets]
      summary: Delete a budget entry
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        "204":
          description: Deleted

  # ── Bills ─────────────────────────────────────────────────────────────────
  /bills:
    get:
      operationId: getBills
      tags: [bills]
      summary: List all bills and subscriptions
      responses:
        "200":
          description: List of bills
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Bill"
    post:
      operationId: createBill
      tags: [bills]
      summary: Create a bill or subscription
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BillInput"
      responses:
        "201":
          description: Created bill
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Bill"

  /bills/{id}:
    patch:
      operationId: updateBill
      tags: [bills]
      summary: Update a bill
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BillUpdate"
      responses:
        "200":
          description: Updated bill
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Bill"
    delete:
      operationId: deleteBill
      tags: [bills]
      summary: Delete a bill
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        "204":
          description: Deleted

  /bills/{id}/mark-paid:
    post:
      operationId: markBillPaid
      tags: [bills]
      summary: Mark a bill as paid for the current cycle
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Updated bill
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Bill"

  /bills/{id}/unmark-paid:
    post:
      operationId: unmarkBillPaid
      tags: [bills]
      summary: Unmark a bill as paid for the current cycle
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Updated bill
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Bill"

  # ── Savings Goals ─────────────────────────────────────────────────────────
  /savings-goals:
    get:
      operationId: getSavingsGoals
      tags: [savings]
      summary: List all savings goals
      responses:
        "200":
          description: List of savings goals
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SavingsGoal"
    post:
      operationId: createSavingsGoal
      tags: [savings]
      summary: Create a savings goal
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SavingsGoalInput"
      responses:
        "201":
          description: Created savings goal
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SavingsGoal"

  /savings-goals/{id}:
    patch:
      operationId: updateSavingsGoal
      tags: [savings]
      summary: Update a savings goal
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SavingsGoalUpdate"
      responses:
        "200":
          description: Updated savings goal
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SavingsGoal"
    delete:
      operationId: deleteSavingsGoal
      tags: [savings]
      summary: Delete a savings goal
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        "204":
          description: Deleted

  /savings-goals/{id}/contribute:
    post:
      operationId: contributeSavingsGoal
      tags: [savings]
      summary: Add a contribution to a savings goal
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SavingsContribution"
      responses:
        "200":
          description: Updated savings goal
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SavingsGoal"

  # ── Dashboard / Analytics (wow endpoints) ─────────────────────────────────
  /dashboard/summary:
    get:
      operationId: getDashboardSummary
      tags: [dashboard]
      summary: Monthly KPI summary for dashboard
      parameters:
        - name: month
          in: query
          schema: { type: ["string", "null"] }
          description: "YYYY-MM format, defaults to current month"
      responses:
        "200":
          description: Dashboard summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardSummary"

  /dashboard/category-breakdown:
    get:
      operationId: getCategoryBreakdown
      tags: [dashboard]
      summary: Spending breakdown by category for a given month
      parameters:
        - name: month
          in: query
          schema: { type: ["string", "null"] }
      responses:
        "200":
          description: Category breakdown
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CategoryBreakdownItem"

  /dashboard/spending-trend:
    get:
      operationId: getSpendingTrend
      tags: [dashboard]
      summary: Monthly spending trend for the past N months
      parameters:
        - name: months
          in: query
          schema: { type: ["integer", "null"] }
          description: Number of months to include (default 6)
      responses:
        "200":
          description: Spending trend
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SpendingTrendItem"

  /dashboard/partner-comparison:
    get:
      operationId: getPartnerComparison
      tags: [dashboard]
      summary: Partner-by-partner spending comparison for a month
      parameters:
        - name: month
          in: query
          schema: { type: ["string", "null"] }
      responses:
        "200":
          description: Partner comparison
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PartnerComparison"

  /dashboard/upcoming-bills:
    get:
      operationId: getUpcomingBills
      tags: [dashboard]
      summary: Bills due in the next 30 days
      responses:
        "200":
          description: Upcoming bills
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Bill"

  /dashboard/budget-vs-actual:
    get:
      operationId: getBudgetVsActual
      tags: [dashboard]
      summary: Budget vs actual spending per category for a month
      parameters:
        - name: month
          in: query
          schema: { type: ["string", "null"] }
      responses:
        "200":
          description: Budget vs actual
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/BudgetVsActualItem"

  /dashboard/shared-vs-personal:
    get:
      operationId: getSharedVsPersonal
      tags: [dashboard]
      summary: Shared vs personal spending by month for the past N months
      parameters:
        - name: months
          in: query
          schema: { type: ["integer", "null"] }
      responses:
        "200":
          description: Shared vs personal trend
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SharedVsPersonalItem"

  /dashboard/top-merchants:
    get:
      operationId: getTopMerchants
      tags: [dashboard]
      summary: Top merchants by spend for a given month
      parameters:
        - name: month
          in: query
          schema: { type: ["string", "null"] }
        - name: limit
          in: query
          schema: { type: ["integer", "null"] }
      responses:
        "200":
          description: Top merchants
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TopMerchantItem"

  /dashboard/spending-heatmap:
    get:
      operationId: getSpendingHeatmap
      tags: [dashboard]
      summary: Daily spending amounts for heatmap display
      parameters:
        - name: month
          in: query
          schema: { type: ["string", "null"] }
      responses:
        "200":
          description: Daily spending heatmap data
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/HeatmapDay"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required: [status]

    # ── Partners ─────────────────────────────────────────────────────────────
    Partner:
      type: object
      required: [id, name, color, role]
      properties:
        id:         { type: integer }
        name:       { type: string }
        color:      { type: string }
        role:       { type: string, enum: [partner_a, partner_b] }
        avatarInitials: { type: string }

    PartnerUpdate:
      type: object
      properties:
        name:   { type: string }
        color:  { type: string }

    # ── Categories ────────────────────────────────────────────────────────────
    Category:
      type: object
      required: [id, name, color, icon, expenseType]
      properties:
        id:          { type: integer }
        name:        { type: string }
        color:       { type: string }
        icon:        { type: string }
        expenseType: { type: string, enum: [fixed, variable, wants, income] }
        sortOrder:   { type: integer }

    CategoryInput:
      type: object
      required: [name, color, icon, expenseType]
      properties:
        name:        { type: string }
        color:       { type: string }
        icon:        { type: string }
        expenseType: { type: string, enum: [fixed, variable, wants, income] }
        sortOrder:   { type: ["integer", "null"] }

    CategoryUpdate:
      type: object
      properties:
        name:        { type: string }
        color:       { type: string }
        icon:        { type: string }
        expenseType: { type: string, enum: [fixed, variable, wants, income] }
        sortOrder:   { type: ["integer", "null"] }

    # ── Accounts ──────────────────────────────────────────────────────────────
    Account:
      type: object
      required: [id, name, type]
      properties:
        id:       { type: integer }
        name:     { type: string }
        type:     { type: string, enum: [checking, savings, credit, joint] }
        ownerId:  { type: ["integer", "null"] }
        balance:  { type: ["number", "null"] }
        isJoint:  { type: boolean }

    AccountInput:
      type: object
      required: [name, type]
      properties:
        name:     { type: string }
        type:     { type: string, enum: [checking, savings, credit, joint] }
        ownerId:  { type: ["integer", "null"] }
        balance:  { type: ["number", "null"] }
        isJoint:  { type: boolean }

    AccountUpdate:
      type: object
      properties:
        name:     { type: string }
        type:     { type: string, enum: [checking, savings, credit, joint] }
        ownerId:  { type: ["integer", "null"] }
        balance:  { type: ["number", "null"] }
        isJoint:  { type: boolean }

    # ── Transactions ──────────────────────────────────────────────────────────
    Transaction:
      type: object
      required: [id, date, amount, merchant, type, ownership, paidById, categoryId]
      properties:
        id:            { type: integer }
        date:          { type: string }
        amount:        { type: number }
        merchant:      { type: string }
        notes:         { type: ["string", "null"] }
        type:          { type: string, enum: [income, expense] }
        ownership:     { type: string, enum: [shared, personal] }
        splitType:     { type: string, enum: [fifty_fifty, custom, personal, settle_later] }
        splitRatio:    { type: ["number", "null"] }
        paidById:      { type: integer }
        categoryId:    { type: integer }
        accountId:     { type: ["integer", "null"] }
        isRecurring:   { type: boolean }
        categoryName:  { type: ["string", "null"] }
        categoryColor: { type: ["string", "null"] }
        paidByName:    { type: ["string", "null"] }

    TransactionInput:
      type: object
      required: [date, amount, merchant, type, ownership, splitType, paidById, categoryId]
      properties:
        date:        { type: string }
        amount:      { type: number }
        merchant:    { type: string }
        notes:       { type: ["string", "null"] }
        type:        { type: string, enum: [income, expense] }
        ownership:   { type: string, enum: [shared, personal] }
        splitType:   { type: string, enum: [fifty_fifty, custom, personal, settle_later] }
        splitRatio:  { type: ["number", "null"] }
        paidById:    { type: integer }
        categoryId:  { type: integer }
        accountId:   { type: ["integer", "null"] }
        isRecurring: { type: boolean }

    TransactionUpdate:
      type: object
      properties:
        date:        { type: string }
        amount:      { type: number }
        merchant:    { type: string }
        notes:       { type: ["string", "null"] }
        type:        { type: string, enum: [income, expense] }
        ownership:   { type: string, enum: [shared, personal] }
        splitType:   { type: string, enum: [fifty_fifty, custom, personal, settle_later] }
        splitRatio:  { type: ["number", "null"] }
        paidById:    { type: integer }
        categoryId:  { type: integer }
        accountId:   { type: ["integer", "null"] }
        isRecurring: { type: boolean }

    TransactionList:
      type: object
      required: [data, total]
      properties:
        data:  { type: array, items: { $ref: "#/components/schemas/Transaction" } }
        total: { type: integer }

    # ── Budgets ───────────────────────────────────────────────────────────────
    Budget:
      type: object
      required: [id, month, categoryId, amount]
      properties:
        id:           { type: integer }
        month:        { type: string }
        categoryId:   { type: integer }
        amount:       { type: number }
        categoryName: { type: ["string", "null"] }
        categoryColor: { type: ["string", "null"] }
        rolloverEnabled: { type: boolean }
        rolloverAmount:  { type: ["number", "null"] }

    BudgetInput:
      type: object
      required: [month, categoryId, amount]
      properties:
        month:           { type: string }
        categoryId:      { type: integer }
        amount:          { type: number }
        rolloverEnabled: { type: boolean }

    BudgetUpdate:
      type: object
      properties:
        amount:          { type: number }
        rolloverEnabled: { type: boolean }

    # ── Bills ─────────────────────────────────────────────────────────────────
    Bill:
      type: object
      required: [id, name, amount, dueDay, frequency, ownership, paidById]
      properties:
